<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#1B7A43"/>

  <!-- QR finder top-left -->
  <rect x="8" y="8" width="18" height="18" rx="3" fill="none" stroke="#ffffff" stroke-width="3"/>
  <rect x="13" y="13" width="8" height="8" rx="1" fill="#ffffff"/>

  <!-- QR finder top-right -->
  <rect x="38" y="8" width="18" height="18" rx="3" fill="none" stroke="#ffffff" stroke-width="3"/>
  <rect x="43" y="13" width="8" height="8" rx="1" fill="#ffffff"/>

  <!-- QR finder bottom-left -->
  <rect x="8" y="38" width="18" height="18" rx="3" fill="none" stroke="#ffffff" stroke-width="3"/>
  <rect x="13" y="43" width="8" height="8" rx="1" fill="#ffffff"/>

  <!-- QR data dots bottom-right area -->
  <rect x="38" y="39" width="6" height="6" rx="1" fill="#ffffff"/>
  <rect x="47" y="39" width="6" height="6" rx="1" fill="#ffffff"/>
  <rect x="38" y="48" width="6" height="6" rx="1" fill="#ffffff"/>
  <rect x="47" y="48" width="6" height="6" rx="1" fill="#ffffff"/>

  <!-- Checkmark circle (gold badge) -->
  <circle cx="48" cy="48" r="14" fill="#0f5c2e"/>
  <circle cx="48" cy="48" r="11" fill="#f5c842"/>
  <polyline points="42,48 46,53 55,41" fill="none" stroke="#0f5c2e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
